<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Golden Fork | Reservations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans">
    <nav class="bg-white shadow-sm p-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-orange-600">The Golden Fork</h1>
            <a href="#admin" class="text-gray-500 text-sm">Admin Login</a>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto mt-10 p-6 bg-white rounded-2xl shadow-xl">
        <h2 class="text-3xl font-semibold mb-6 text-gray-800">Book Your Table</h2>
        
        <form id="bookingForm" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="name" placeholder="Full Name" required class="w-full p-3 border rounded-lg">
                <input type="email" id="email" placeholder="Email Address" required class="w-full p-3 border rounded-lg">
                <input type="date" id="date" required class="w-full p-3 border rounded-lg">
                <input type="time" id="time" required class="w-full p-3 border rounded-lg">
                <select id="guests" class="w-full p-3 border rounded-lg">
                    <option value="2">2 Guests</option>
                    <option value="4">4 Guests</option>
                    <option value="6">6 Guests</option>
                </select>
            </div>
            <button type="submit" class="w-full bg-orange-600 text-white font-bold py-4 rounded-lg hover:bg-orange-700 transition">
                Confirm Reservation
            </button>
        </form>
        <div id="status" class="mt-4 text-center hidden p-3 rounded"></div>
    </main>

    <section id="admin" class="max-w-5xl mx-auto mt-20 p-6">
        <h2 class="text-2xl font-bold mb-4">Manage Reservations</h2>
        <div class="bg-white rounded-lg shadow overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-100">
                    <tr>
                        <th class="p-4">Customer</th>
                        <th class="p-4">Date</th>
                        <th class="p-4">Time</th>
                        <th class="p-4">Guests</th>
                    </tr>
                </thead>
                <tbody id="resTableBody">
                    <!-- Reservations will appear here -->
                </tbody>
            </table>
        </div>
    </section>

    <script>
        // REPLACE THESE WITH YOUR SUPABASE KEYS
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = lib.createClient(SUPABASE_URL, SUPABASE_KEY);

        const form = document.getElementById('bookingForm');
        const status = document.getElementById('status');

        form.onsubmit = async (e) => {
            e.preventDefault();
            const { data, error } = await supabase.from('reservations').insert([{
                customer_name: document.getElementById('name').value,
                customer_email: document.getElementById('email').value,
                reservation_date: document.getElementById('date').value,
                reservation_time: document.getElementById('time').value,
                guest_count: document.getElementById('guests').value
            }]);

            if (error) {
                status.innerText = "Error: " + error.message;
                status.className = "mt-4 text-center p-3 bg-red-100 text-red-700";
            } else {
                status.innerText = "Success! Your table is booked.";
                status.className = "mt-4 text-center p-3 bg-green-100 text-green-700";
                form.reset();
                loadReservations();
            }
            status.classList.remove('hidden');
        };

        async function loadReservations() {
            const { data } = await supabase.from('reservations').select('*');
            const tbody = document.getElementById('resTableBody');
            tbody.innerHTML = data.map(res => `
                <tr class="border-t">
                    <td class="p-4">${res.customer_name}</td>
                    <td class="p-4">${res.reservation_date}</td>
                    <td class="p-4">${res.reservation_time}</td>
                    <td class="p-4">${res.guest_count}</td>
                </tr>
            `).join('');
        }
        loadReservations();
    </script>
</body>
</html>
