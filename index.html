<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Golden Fork | Reservations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans">
    <nav class="bg-white shadow-sm p-4 text-center">
        <h1 class="text-2xl font-bold text-orange-600">The Golden Fork</h1>
    </nav>

    <main class="max-w-3xl mx-auto mt-10 p-6 bg-white rounded-2xl shadow-xl border border-gray-100">
        <h2 class="text-3xl font-semibold mb-6 text-gray-800 text-center">Book Your Table</h2>
        
        <form id="bookingForm" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="name" placeholder="Full Name" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-orange-500 outline-none">
                <input type="email" id="email" placeholder="Email Address" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-orange-500 outline-none">
                <input type="date" id="date" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-orange-500 outline-none">
                <input type="time" id="time" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-orange-500 outline-none">
                <select id="guests" class="w-full p-3 border rounded-lg">
                    <option value="2">2 Guests</option>
                    <option value="4">4 Guests</option>
                    <option value="6">6 Guests</option>
                    <option value="8">8 Guests</option>
                </select>
            </div>
            <button type="submit" id="submitBtn" class="w-full bg-orange-600 text-white font-bold py-4 rounded-lg hover:bg-orange-700 transition">
                Confirm Reservation
            </button>
        </form>
        <div id="status" class="mt-4 text-center hidden p-3 rounded font-medium"></div>
    </main>

    <section class="max-w-5xl mx-auto mt-20 p-6 mb-20">
        <h2 class="text-2xl font-bold mb-4 text-gray-700 text-center">Reservation Management</h2>
        <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-100">
            <table class="w-full text-left">
                <thead class="bg-gray-100 border-b">
                    <tr>
                        <th class="p-4 text-gray-600">Customer</th>
                        <th class="p-4 text-gray-600">Date</th>
                        <th class="p-4 text-gray-600">Time</th>
                        <th class="p-4 text-gray-600">Guests</th>
                    </tr>
                </thead>
                <tbody id="resTableBody">
                    <!-- Data will appear here -->
                </tbody>
            </table>
        </div>
    </section>

    <script>
        // CONFIGURATION - I filled in your URL for you!
        const SUPABASE_URL = 'https://rpakrroubrsnkjtjzihc.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJwYWtycm91YnJzbmtqdGp6aWhjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NTE3NTQsImV4cCI6MjA5NjIyNzc1NH0.iAxmAFKr1BbTGJR5jbeY8GQ5lv_KqxpFhnK3groXabA
'; // <--- PASTE YOUR LONG KEY HERE
        
        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        const form = document.getElementById('bookingForm');
        const status = document.getElementById('status');
        const submitBtn = document.getElementById('submitBtn');

        form.onsubmit = async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.innerText = "Booking...";

            const { data, error } = await _supabase.from('reservations').insert([{
                customer_name: document.getElementById('name').value,
                customer_email: document.getElementById('email').value,
                reservation_date: document.getElementById('date').value,
                reservation_time: document.getElementById('time').value,
                guest_count: parseInt(document.getElementById('guests').value)
            }]);

            if (error) {
                status.innerText = "Error: " + error.message;
                status.className = "mt-4 text-center p-3 bg-red-100 text-red-700 block rounded";
            } else {
                status.innerText = "Success! Table Booked.";
                status.className = "mt-4 text-center p-3 bg-green-100 text-green-700 block rounded";
                form.reset();
                loadReservations();
            }
            submitBtn.disabled = false;
            submitBtn.innerText = "Confirm Reservation";
        };

        async function loadReservations() {
            const { data } = await _supabase.from('reservations').select('*').order('created_at', { ascending: false });
            if (data) {
                const tbody = document.getElementById('resTableBody');
                tbody.innerHTML = data.map(res => `
                    <tr class="border-t">
                        <td class="p-4 font-medium">${res.customer_name}</td>
                        <td class="p-4">${res.reservation_date}</td>
                        <td class="p-4">${res.reservation_time}</td>
                        <td class="p-4">${res.guest_count}</td>
                    </tr>
                `).join('');
            }
        }
        loadReservations();
    </script>
</body>
</html>
